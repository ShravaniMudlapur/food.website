<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious Bites | Food Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <!-- Navbar -->
    <nav class="bg-red-600 p-4 fixed w-full top-0 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-white">Delicious Bites</h1>
            <ul class="hidden md:flex space-x-6 text-white">
                <li><a href="#home" class="hover:text-yellow-300">Home</a></li>
                <li><a href="#dishes" class="hover:text-yellow-300">Dishes</a></li>
                <li><a href="#offers" class="hover:text-yellow-300">Offers</a></li>
                <li><a href="#contact" class="hover:text-yellow-300">Contact</a></li>
            </ul>
            <button id="menu-btn" class="md:hidden text-white text-2xl">☰</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="h-screen flex items-center justify-center bg-cover bg-center text-center"
        style="background-image: url('https://source.unsplash.com/1600x900/?food,restaurant');">
        <div class="bg-black bg-opacity-50 p-10 rounded-lg">
            <h1 class="text-4xl md:text-6xl font-bold text-white">Savor Every Bite!</h1>
            <p class="mt-4 text-lg text-yellow-300">Experience the best flavors from around the world.</p>
            <button class="mt-6 px-6 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition">
                Order Now
            </button>
        </div>
